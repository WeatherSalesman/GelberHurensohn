<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelber Hurensohn</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 0;
    color: #222;
}

#container {
    max-width: 56em;
    margin: 0 auto;
    background: white;
    padding: 32px 10px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    background-image: url("hurensohn.png");
    background-color: rgba(255, 255, 255, 0.5);
    background-blend-mode: lighten;
    background-position: right 0px top 0px;
    background-repeat: no-repeat;
}

h1 {
    margin-top: 0;
}

.search {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 8px;
    font-size: 16px;
    width: auto;
    min-width: 2em;
    max-width: 12em;
}

button {
    padding: 8px 14px;
    cursor: pointer;
}

.tempContainerDiv {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    margin-top: 15px;
}

.tempDiv {
    min-width: 70px;
    text-align: center;
    background: #eef4ff;
    padding: 10px;
    border-radius: 8px;
}

.small {
    color: #666;
    font-size: 0.9em;
}

a {
    text-decoration: none;
    color: orange;
}

#spacer {
    min-height: 100vh;
}
</style>
</head>
<body>

<div id="container">

<h1>Gelber Hurensohn</h1>

<div class="search">
    <input
        id="locationInput"
        type="text"
        placeholder="Ortsname (z.B. Mordor)"
    >
    <button id="searchLocationButton" onclick="searchLocation()">Suchen</button>
    <button id="useMyLocationButton" onclick="useMyLocation(true)">Standort</button>
</div>

<h3 id="place">Kein Standort</h3>

<h2 id="currentTemp" style="display: inline;clear: none;"></h2><p id="currentTempText" style="display: inline;clear: none;"></p>

<div id="hourlyTemps" class="tempContainerDiv"></div>
<div id="dailyTemps" class="tempContainerDiv"></div>

<p id="sunInfo"></p>

<small><a href="https://open-meteo.com/"> Weather data by Open-Meteo.com </a> under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a></small>

</div>

<div style="font-size: 0.75em; position: absolute; bottom: -1em;"><a href="impressum.html">Impressum</a> <a href="datenschutz.html">Datenschutzerklärung</a></div>

<script>
if(typeof(String.prototype.trim) === "undefined")
{
    String.prototype.trim = function() 
    {
        return String(this).replace(/^\s+|\s+$/g, '');
    };
}

async function loadWeather(lat, lon, label)
{
    document.getElementById("place").textContent = "Lädt...";

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m` +
        `&hourly=temperature_2m` +
        `&daily=sunrise,sunset,temperature_2m_max,temperature_2m_min` +
        `&forecast_days=8` +
        `&timezone=auto`;

    const response = await fetch(url);
    const data = await response.json();

    document.getElementById("place").textContent = label;

    document.getElementById("currentTemp").textContent =
        data.current.temperature_2m.toFixed(1).toString() + "°C";
    
    var bgImage = "hurensohn.png";
    var currentTempText = "";
    if (data.current.temperature_2m >= 35.0)
    {
        currentTempText = " müssen wir wegen des Gelben Hurensohns aktuell ertragen, weil er uns töten will 😥";
        bgImage = "hurensohn_finger.png";
    }
    else if (data.current.temperature_2m >= 24.0)
    {
        currentTempText = " müssen wir wegen des Gelben Hurensohns aktuell ertragen 🫠";
        bgImage = "hurensohn_finger.png";
    }
    else if (data.current.temperature_2m >= 21.0)
    {
        currentTempText = " gönnt uns der Gelbe Ehrenbruder momentan 😎";
    }
    else if (data.current.temperature_2m >= 18.0)
    {
        currentTempText = " gönnt uns der Gelbe Hurensohn momentan 🌞";
    }
    else if (data.current.temperature_2m >= 12.0)
    {
        currentTempText = " lässt der Gelbe Hurensohn uns momentan noch 🌤";
        bgImage = "hurensohn_finger.png";
    }
    else if (data.current.temperature_2m >= 0.0)
    {
        currentTempText = " lässt der Gelbe Hurensohn uns momentan nur noch, weil er zu faul ist 😥";
        bgImage = "hurensohn_finger.png";
    }
    else
    {
        currentTempText = " lässt der Gelbe Hurensohn uns nur noch, weil er uns töten will 😥";
        bgImage = "hurensohn_finger.png";
    }
    
    document.getElementById("currentTempText").textContent = currentTempText;
    document.getElementById("container").style.backgroundImage = "url("+bgImage+")";

    const now = new Date();

    const sunriseToday = new Date(data.daily.sunrise[0]);
    const sunsetToday = new Date(data.daily.sunset[0]);
    const sunriseTomorrow = new Date(data.daily.sunrise[1]);

    if (now < sunsetToday && now > sunriseToday)
    {
        document.getElementById("sunInfo").innerHTML =
            "Um " +
                (sunsetToday.toLocaleTimeString("de-DE",
                {
                    hour: "2-digit",
                    minute: "2-digit"
                }) + 
                " Uhr").bold() + " verpisst sich der Gelbe Hurensohn wieder 🥳";
    }
    else
    {
        const sunrise =
            now < sunriseToday ? sunriseToday : sunriseTomorrow;

        document.getElementById("sunInfo").innerHTML =
            "Um <b>" +
                (sunrise.toLocaleTimeString("de-DE",
                {
                    hour: "2-digit",
                    minute: "2-digit"
                }) +
                " Uhr").bold() + " kommt der Gelbe Hurensohn zurück :("
    }

    const hourlyDiv = document.getElementById("hourlyTemps");
    hourlyDiv.innerHTML = "";

    var nextDay = new Date();
    nextDay.setDate(nextDay.getDate() + 1);

    for (let i = 0, j = 0; i < data.hourly.temperature_2m.length && j < 24; i++)
    {
        const temp = data.hourly.temperature_2m[i]
        const time = new Date(data.hourly.time[i]);
        if (time >= now && (time.getDate() === now.getDate() || time.getDate() === nextDay.getDate()))
        {
            const div = document.createElement("div");
            div.className = "tempDiv";

            div.innerHTML =
                `<div>${time.getHours()}:00</div>
                 <strong>${temp}°C</strong>`;

            hourlyDiv.appendChild(div);
            j += 1;
        }
    }
    
    const dailyDiv = document.getElementById("dailyTemps");
    dailyDiv.innerHTML = "";
    
    for (let i = 0; i < data.daily.time.length && i < 8; i++)
    {
        const temp_max = data.daily.temperature_2m_max[i]
        const temp_min = data.daily.temperature_2m_min[i]
        const temp_date = new Date(data.daily.time[i]);
        if (temp_date >= now)
        {
            const div = document.createElement("div");
            div.className = "tempDiv";
            
            const dateOptions = {"weekday": "short", month: "numeric", day: "numeric"}
            div.innerHTML =
                `<div>${temp_date.toLocaleDateString("de-DE", dateOptions)}</div>
                 <div><strong>${temp_max}°C</strong> / <small>${temp_min}°C</small></div>`;

            dailyDiv.appendChild(div);
        }
    }
}

async function searchLocation()
{
    const query = document.getElementById("locationInput").value.trim();
	if (!query) return;
	
	document.getElementById("place").textContent = "Suche Standort...";
	
	var place = null;
	
	const plzRegexp = /^\d{5}$/;
	
	if (query.toLowerCase() === "mordor")
	{
		place = await findMordor();
	}
	else if (query.length == 5 && plzRegexp.test(query))
	{
		var res = null;
		try
		{
			res = await fetch(
				`https://nominatim.openstreetmap.org/search?postalcode=${query}&country=Germany&format=jsonv2`
			);
		}
		catch (e)
		{
			alert("Nö, finden wa nicht.");
			return;
		}
		const geo = await res.json();
		
		if (!geo || geo.length === 0)
		{
			alert("Nö, finden wa nicht.");
			return;
		}

		place = geo[0];
		place = {
			latitude: place.lat,
			longitude: place.lon,
			name: place.display_name,
		};
	}
	else
	{
		const res = await fetch(
			`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1`
		);
		const geo = await res.json();

		if (!geo.results || geo.results.length === 0)
		{
			alert("Nö, finden wa nicht.");
			return;
		}

		place = geo.results[0];
		place = {
			latitude: place.latitude,
			longitude: place.longitude,
			name: `${place.name}, ${place.country}`,
		};
	}
	
	loadWeather(place.latitude, place.longitude, place.name);
}

async function useMyLocation(enableAlert)
{
    if (enableAlert)
    {
        document.getElementById("place").textContent = "Suche Standort...";
    }

    const options = {
        enableHighAccuracy: true,
        timeout: 30000,
        maximumAge: 600000,
    };

    navigator.geolocation.getCurrentPosition(
        showMyLocation,
        (err) => {
            console.warn(`Geolocation Error (${err.code}): ${err.message}`);
            if (enableAlert)
            {
                alert("Dein Standort konnte nicht ermittelt werden.");
            }
        },
        options
    );
}

async function showMyLocation(pos)
{
	console.log("Got location: "+pos.coords.latitude.toString()+", "+pos.coords.longitude.toString());
	var locationString = "Jetziger Standort ("+pos.coords.latitude.toString()+", "+pos.coords.longitude.toString()+")";
	//var location = await getLocationName(pos.coords.latitude, pos.coords.longitude);
	//if (location)
	//{
	//	locationString = `${location.name}, ${location.country}`;
	//}
	loadWeather(
		pos.coords.latitude,
		pos.coords.longitude,
		locationString
	);
}

async function getLocationName(lat, lon) {
	console.log(lat.toString()+", "+lon.toString());
	const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=de`;

	const response = await fetch(url);
	const data = await response.json();

	if (!data.results?.length)
	{
		return null;
	}

	const place = data.results[0];

	return {
		name: place.name,
		country: place.country,
		region: place.admin1,
		latitude: place.latitude,
		longitude: place.longitude,
	};
}

document.getElementById("locationInput").addEventListener("keyup", function(event)
